name: CI

# Type-check, unit-test, and build on every push to main and every PR — so
# regressions (and auto-generated dependency PRs) are caught before they merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: check · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      # `npm ci` honours .npmrc (legacy-peer-deps) and runs `prepare` (panda codegen).
      - name: Install dependencies
        run: npm ci

      - name: Type-check (astro check)
        run: npm run check

      - name: Unit tests (vitest)
        run: npm test

      - name: Production build
        run: npm run build
