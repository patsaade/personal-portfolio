# Keep dependencies (and the GitHub Actions in CI) patched automatically.
# Updates open as PRs, which the CI workflow type-checks, tests, and builds
# before they can merge. Current `npm audit` advisories have no forward fix yet
# (npm only offers major downgrades); Dependabot will raise them as upstreams ship.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Astro core + integrations must move together.
      astro:
        patterns:
          - astro
          - "@astrojs/*"
      # Fold routine minor/patch bumps into one PR each to reduce noise.
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
